codecov:
  require_ci_to_pass: false

coverage:
  precision: 2
  round: down
  range: "50...80"

  status:
    project:
      default:
        target: auto
        threshold: 1%

    patch:
      default:
        target: 70%
        threshold: 0%
        only_pulls: true

comment:
  layout: "reach,diff,files"
  behavior: default
  require_changes: false

ignore:
  # Swagger/OpenAPI docs generated by `swag init`
  - "docs/**"
  # Mocks generated by mockery — no business logic to cover
  - "internal/test/mocks/**"
  # Test-only fixtures/harness code (testcontainers wiring), not app logic
  - "internal/test/testenv/**"
  # Entry points / dependency wiring — thin glue code, low test value
  - "cmd/**"