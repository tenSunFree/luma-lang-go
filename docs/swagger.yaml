basePath: /api/v1
definitions:
  requests.ChangePasswordRequest:
    properties:
      current_password:
        maxLength: 72
        minLength: 1
        type: string
      new_password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  requests.ForgotPasswordRequest:
    properties:
      email:
        maxLength: 50
        type: string
    required:
    - email
    type: object
  requests.LoginRequest:
    properties:
      email:
        maxLength: 50
        type: string
      password:
        maxLength: 72
        minLength: 1
        type: string
    required:
    - email
    - password
    type: object
  requests.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  requests.RegisterRequest:
    properties:
      email:
        maxLength: 50
        type: string
      full_name:
        maxLength: 100
        minLength: 2
        type: string
      gender:
        enum:
        - male
        - female
        - other
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      phone:
        maxLength: 20
        minLength: 8
        type: string
      username:
        maxLength: 25
        minLength: 3
        type: string
    required:
    - email
    - full_name
    - password
    - username
    type: object
  requests.ResetPasswordRequest:
    properties:
      new_password:
        maxLength: 72
        minLength: 8
        type: string
      token:
        type: string
    required:
    - new_password
    - token
    type: object
  requests.SendOTPRequest:
    properties:
      email:
        maxLength: 50
        type: string
    required:
    - email
    type: object
  requests.VerifyOTPRequest:
    properties:
      code:
        type: string
      email:
        maxLength: 50
        type: string
    required:
    - code
    - email
    type: object
  responses.CaptionResponse:
    properties:
      endMs:
        example: 70000
        type: integer
      id:
        example: cap_001
        type: string
      sortOrder:
        example: 1
        type: integer
      startMs:
        example: 65000
        type: integer
      textEn:
        example: poetry is not in grand moments
        type: string
      textZhTw:
        example: 詩意不在那些宏大的時刻
        type: string
    type: object
  responses.LessonDetailResponse:
    properties:
      captions:
        items:
          $ref: '#/definitions/responses.CaptionResponse'
        type: array
      captionsVersion:
        example: 1
        type: integer
      lesson:
        $ref: '#/definitions/responses.LessonListItemResponse'
      playback:
        $ref: '#/definitions/responses.LessonPlaybackResponse'
      vocabularyItems:
        items:
          $ref: '#/definitions/responses.VocabularyItemResponse'
        type: array
    type: object
  responses.LessonListItemResponse:
    properties:
      category:
        example: cinephile
        type: string
      coverUrl:
        example: https://example.com/covers/paterson.jpg
        type: string
      createdAt:
        example: "2026-05-14T22:00:00+08:00"
        type: string
      description:
        example: 透過電影片段學習自然英文表達。
        type: string
      durationMs:
        example: 279000
        type: integer
      id:
        example: paterson_001
        type: string
      isFree:
        example: true
        type: boolean
      level:
        example: intermediate
        type: string
      subtitle:
        example: FUNDAY英語學院 - 專業線上英文教學
        type: string
      tags:
        example:
        - movie
        - poetry
        - daily-life
        items:
          type: string
        type: array
      title:
        example: FUNDAY Cinephile 電影迷 | Paterson 派特森
        type: string
      updatedAt:
        example: "2026-05-14T22:00:00+08:00"
        type: string
      viewCount:
        example: 1166
        type: integer
    type: object
  responses.LessonPlaybackResponse:
    properties:
      allowPlaybackSpeed:
        example: true
        type: boolean
      allowSeek:
        example: true
        type: boolean
      durationMs:
        example: 279000
        type: integer
      hlsUrl:
        example: https://cdn.example.com/videos/paterson.m3u8
        type: string
      startAtMs:
        example: 0
        type: integer
      videoProvider:
        example: youtube
        type: string
      videoUrl:
        example: https://cdn.example.com/videos/paterson.mp4
        type: string
      youtubeVideoId:
        example: abc123xyz
        type: string
    type: object
  responses.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      gender:
        type: string
      id:
        type: string
      phone:
        type: string
      refresh_token:
        type: string
      role_id:
        type: integer
      token:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  responses.VocabularyExampleResponse:
    properties:
      en:
        example: That loud crash scared the daylights out of me.
        type: string
      zhTw:
        example: 那一聲巨響把我嚇壞了。
        type: string
    type: object
  responses.VocabularyItemResponse:
    properties:
      captionId:
        example: cap_003
        type: string
      definitionEn:
        example: normal or everyday moments
        type: string
      definitionZhTw:
        example: 平凡的瞬間
        type: string
      endMs:
        example: 35000
        type: integer
      examples:
        items:
          $ref: '#/definitions/responses.VocabularyExampleResponse'
        type: array
      id:
        example: voc_001
        type: string
      level:
        example: A2
        type: string
      noteZhTw:
        example: ones 代替前面的 moments，避免重複。
        type: string
      phrase:
        example: ordinary ones
        type: string
      startMs:
        example: 20000
        type: integer
    type: object
  v1.BaseResponse:
    properties:
      data: {}
      message:
        type: string
      status:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    name: Najib Fikri
    url: mailto:najibfikri26@gmail.com
  description: A starting point for building RESTful APIs in Go using the Gin framework,
    sqlx for PostgreSQL, and Redis for caching. Implementation follows Clean Architecture
    principles as described by Uncle Bob.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/snykk/go-rest-boilerplate
  title: Go REST Boilerplate API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Returns an access token (short TTL) and a refresh token (longer
        TTL). Wrong password and unknown email take the same wall time to prevent
        user enumeration.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Tokens issued
          schema:
            allOf:
            - $ref: '#/definitions/v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.UserResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "403":
          description: Account not yet activated
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/v1.BaseResponse'
      summary: Authenticate and issue a token pair
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Deletes the refresh-token jti from Redis so /auth/refresh rejects
        it. Access tokens remain valid until their natural expiry — clients should
        discard them on logout.
      parameters:
      - description: Refresh token to revoke
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged out
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "401":
          description: Refresh token invalid
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/v1.BaseResponse'
      summary: Revoke the refresh token
      tags:
      - auth
  /auth/password/change:
    put:
      consumes:
      - application/json
      description: Verifies the current password, swaps it for the new one, and stamps
        the revocation cutoff so refresh tokens issued before now are rejected.
      parameters:
      - description: Current + new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password changed
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "401":
          description: Current password incorrect
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Change the authenticated user's password
      tags:
      - auth
  /auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Emails an opaque reset token to the address. Always returns 200
        even if the email isn't registered, to defeat user enumeration.
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset email queued (or email not registered — same response
            either way)
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/v1.BaseResponse'
      summary: Issue a password-reset token
      tags:
      - auth
  /auth/password/reset:
    post:
      consumes:
      - application/json
      description: Validates the token issued by ForgotPassword, sets the new password,
        and advances the revocation cutoff.
      parameters:
      - description: Reset token + new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "401":
          description: Reset token invalid or expired
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/v1.BaseResponse'
      summary: Consume a reset token and set a new password
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Verifies the supplied refresh token, mints a new access+refresh
        pair, and revokes the old jti in Redis. Replaying an already-rotated token
        returns 401.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New token pair
          schema:
            allOf:
            - $ref: '#/definitions/v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.UserResponse'
              type: object
        "401":
          description: Refresh token invalid, expired, or already revoked
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "403":
          description: Account no longer active
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/v1.BaseResponse'
      summary: Rotate the refresh token, return a new pair
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a user account in inactive state. The caller must follow
        up with /auth/send-otp + /auth/verify-otp to activate the account before /auth/login
        will succeed.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created
          schema:
            allOf:
            - $ref: '#/definitions/v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.UserResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "409":
          description: Email or username already in use
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "422":
          description: Validation error (per-field detail in data.errors)
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/v1.BaseResponse'
      summary: Register a new user
      tags:
      - auth
  /auth/send-otp:
    post:
      consumes:
      - application/json
      description: Generates a 6-digit OTP, stores it in Redis with a TTL, and enqueues
        the email via the async mailer. The HTTP response returns on enqueue, not
        on actual SMTP delivery.
      parameters:
      - description: Email to send OTP to
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.SendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP enqueued
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "400":
          description: Account already activated
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "404":
          description: Email not registered
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "500":
          description: Failed to enqueue mail
          schema:
            $ref: '#/definitions/v1.BaseResponse'
      summary: Send an OTP code to the user's email
      tags:
      - auth
  /auth/verify-otp:
    post:
      consumes:
      - application/json
      description: Validates the supplied code against Redis and flips the user's
        active flag to true on success. Brute-force-guarded — after OTP_MAX_ATTEMPTS
        failures (default 5) the email is locked out for the OTP TTL window even with
        the correct code.
      parameters:
      - description: Email + OTP code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/requests.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Account activated
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "400":
          description: Invalid OTP code
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "403":
          description: Locked out — too many invalid attempts
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "404":
          description: Email not registered
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/v1.BaseResponse'
      summary: Verify an OTP code and activate the account
      tags:
      - auth
  /lessons:
    get:
      description: Returns all published video lessons for the home/list page.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/v1.BaseResponse'
            - properties:
                data:
                  additionalProperties:
                    items:
                      $ref: '#/definitions/responses.LessonListItemResponse'
                    type: array
                  type: object
              type: object
      summary: 影片列表 / Get lesson list
      tags:
      - lessons
  /lessons/{lessonId}:
    get:
      description: 'Returns full lesson data: lesson info, playback config, time-synced
        captions (startMs/endMs), and vocabulary teaching items. Flutter calls this
        once when entering the playback screen.'
      parameters:
      - description: Lesson ID (e.g. paterson_001)
        in: path
        name: lessonId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.LessonDetailResponse'
              type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/v1.BaseResponse'
      summary: 影片詳情 / Get lesson detail
      tags:
      - lessons
  /users/me:
    get:
      description: Reads the authenticated user from the JWT in the Authorization
        header and returns the matching record (in-memory cache first, Postgres on
        miss).
      produces:
      - application/json
      responses:
        "200":
          description: User profile
          schema:
            allOf:
            - $ref: '#/definitions/v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/responses.UserResponse'
              type: object
        "401":
          description: Missing or invalid token
          schema:
            $ref: '#/definitions/v1.BaseResponse'
        "404":
          description: User no longer exists
          schema:
            $ref: '#/definitions/v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Return the current user's profile
      tags:
      - users
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: Bearer access token issued by /auth/login or /auth/refresh.
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
