      description: 'One-shot API: creates the live_course record, sets status to live,
        and returns Agora RTC tokens for camera (uid=1000) and screen (uid=2000).
        If the teacher already has an active live, returns a new token for that live
        instead (idempotent).'
      parameters:
      - description: Live room info
        in: body
        name: request
        required: true
