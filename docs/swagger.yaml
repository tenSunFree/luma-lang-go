basePath: /api/v1
definitions:
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.ChangePasswordRequest:
    properties:
      current_password:
        maxLength: 72
        minLength: 1
        type: string
      new_password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - current_password
    - new_password
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.ForgotPasswordRequest:
    properties:
      email:
        maxLength: 50
        type: string
    required:
    - email
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.JoinLiveRequest:
    properties:
      clientType:
        example: android
        type: string
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.LeaveLiveRequest:
    properties:
      uid:
        example: 10042
        type: integer
    required:
    - uid
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.LoginRequest:
    properties:
      email:
        maxLength: 50
        type: string
      password:
        maxLength: 72
        minLength: 1
        type: string
    required:
    - email
    - password
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.RefreshRequest:
    properties:
      refresh_token:
        type: string
    required:
    - refresh_token
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.RegisterRequest:
    properties:
      email:
        maxLength: 50
        type: string
      full_name:
        maxLength: 100
        minLength: 2
        type: string
      gender:
        enum:
        - male
        - female
        - other
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
      phone:
        maxLength: 20
        minLength: 8
        type: string
      username:
        maxLength: 25
        minLength: 3
        type: string
    required:
    - email
    - full_name
    - password
    - username
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.RenewTokenRequest:
    properties:
      uid:
        example: 10042
        type: integer
    required:
    - uid
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.ResetPasswordRequest:
    properties:
      code:
        type: string
      email:
        maxLength: 50
        type: string
      new_password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - code
    - email
    - new_password
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.SendOTPRequest:
    properties:
      email:
        maxLength: 50
        type: string
    required:
    - email
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.StartTeacherLiveRequest:
    properties:
      category:
        example: 語言學習
        type: string
      courseType:
        example: live
        type: string
      level:
        example: A2
        type: string
      textbookUrl:
        example: https://cdn.example.com/book.pdf
        type: string
      thumbnailUrl:
        example: https://cdn.example.com/thumb.jpg
        type: string
      title:
        example: 雅思閱讀 - 即時直播課
        type: string
    required:
    - title
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.VerifyOTPRequest:
    properties:
      code:
        type: string
      email:
        maxLength: 50
        type: string
    required:
    - code
    - email
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.LiveCourseResponse:
    properties:
      canJoin:
        example: false
        type: boolean
      category:
        example: 語言學習
        type: string
      courseId:
        example: course_ielts_001
        type: string
      courseType:
        example: required
        type: string
      endedAt:
        type: string
      isReminderEnabled:
        example: false
        type: boolean
      level:
        example: A2
        type: string
      liveId:
        example: live_20260618_1900_001
        type: string
      scheduledStartAt:
        example: "2026-06-18T19:00:00+08:00"
        type: string
      startedAt:
        example: "2026-06-18T19:02:00+08:00"
        type: string
      status:
        example: scheduled
        type: string
      teacher:
        $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.TeacherResponse'
      textbookUrl:
        example: https://cdn.example.com/textbooks/ielts_001.pdf
        type: string
      thumbnailUrl:
        example: https://cdn.example.com/courses/ielts_001.jpg
        type: string
      title:
        example: 雅思閱讀[一般訓練組] - 段落標題-複習篇
        type: string
      viewerCount:
        example: 42
        type: integer
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.TeacherResponse:
    properties:
      avatarUrl:
        example: https://cdn.example.com/teachers/ben.jpg
        type: string
      name:
        example: Ben
        type: string
      teacherId:
        example: teacher_ben
        type: string
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.UserResponse:
    properties:
      created_at:
        type: string
      email:
        type: string
      full_name:
        type: string
      gender:
        type: string
      id:
        type: string
      phone:
        type: string
      refresh_token:
        type: string
      role_id:
        type: integer
      token:
        type: string
      updated_at:
        type: string
      username:
        type: string
    type: object
  github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse:
    properties:
      data: {}
      message:
        type: string
      status:
        type: boolean
    type: object
host: localhost:8080
info:
  contact:
    name: Najib Fikri
    url: mailto:najibfikri26@gmail.com
  description: A starting point for building RESTful APIs in Go using the Gin framework,
    sqlx for PostgreSQL, and Redis for caching. Implementation follows Clean Architecture
    principles as described by Uncle Bob.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/snykk/go-rest-boilerplate
  title: Go REST Boilerplate API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Returns an access token (short TTL) and a refresh token (longer
        TTL). Wrong password and unknown email take the same wall time to prevent
        user enumeration.
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Tokens issued
          schema:
            allOf:
            - $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.UserResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Invalid email or password
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Account not yet activated
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      summary: Authenticate and issue a token pair
      tags:
      - auth
  /auth/logout:
    post:
      consumes:
      - application/json
      description: Deletes the refresh-token jti from Redis so /auth/refresh rejects
        it. Access tokens remain valid until their natural expiry — clients should
        discard them on logout.
      parameters:
      - description: Refresh token to revoke
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Logged out
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Refresh token invalid
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      summary: Revoke the refresh token
      tags:
      - auth
  /auth/password/change:
    put:
      consumes:
      - application/json
      description: Verifies the current password, swaps it for the new one, and stamps
        the revocation cutoff so refresh tokens issued before now are rejected.
      parameters:
      - description: Current + new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.ChangePasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password changed
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Current password incorrect
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: Change the authenticated user's password
      tags:
      - auth
  /auth/password/forgot:
    post:
      consumes:
      - application/json
      description: Emails a six-digit reset code to the address. Always returns 200
        even if the email isn't registered, to defeat user enumeration.
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset code queued (or email not registered — same response
            either way)
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      summary: Issue a password-reset code
      tags:
      - auth
  /auth/password/reset:
    post:
      consumes:
      - application/json
      description: Validates the six-digit code emailed by ForgotPassword and sets
        the new password in one step.
      parameters:
      - description: Email + six-digit code + new password
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password reset
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Malformed request
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "401":
          description: Reset code invalid or expired
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Too many invalid attempts
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      summary: Verify reset code and set a new password
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Verifies the supplied refresh token, mints a new access+refresh
        pair, and revokes the old jti in Redis. Replaying an already-rotated token
        returns 401.
      parameters:
      - description: Refresh token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.RefreshRequest'
      produces:
      - application/json
      responses:
        "200":
          description: New token pair
          schema:
            allOf:
            - $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.UserResponse'
              type: object
        "401":
          description: Refresh token invalid, expired, or already revoked
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Account no longer active
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      summary: Rotate the refresh token, return a new pair
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a user account in inactive state. The caller must follow
        up with /auth/send-otp + /auth/verify-otp to activate the account before /auth/login
        will succeed.
      parameters:
      - description: Registration payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created
          schema:
            allOf:
            - $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.UserResponse'
              type: object
        "400":
          description: Malformed JSON body
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "409":
          description: Email or username already in use
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error (per-field detail in data.errors)
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "500":
          description: Internal error
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      summary: Register a new user
      tags:
      - auth
  /auth/send-otp:
    post:
      consumes:
      - application/json
      description: Generates a 6-digit OTP, stores it in Redis with a TTL, and enqueues
        the email via the async mailer. The HTTP response returns on enqueue, not
        on actual SMTP delivery.
      parameters:
      - description: Email to send OTP to
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.SendOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OTP enqueued
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Account already activated
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "404":
          description: Email not registered
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "500":
          description: Failed to enqueue mail
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      summary: Send an OTP code to the user's email
      tags:
      - auth
  /auth/verify-otp:
    post:
      consumes:
      - application/json
      description: Validates the supplied code against Redis and flips the user's
        active flag to true on success. Brute-force-guarded — after OTP_MAX_ATTEMPTS
        failures (default 5) the email is locked out for the OTP TTL window even with
        the correct code.
      parameters:
      - description: Email + OTP code
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.VerifyOTPRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Account activated
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "400":
          description: Invalid OTP code
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "403":
          description: Locked out — too many invalid attempts
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "404":
          description: Email not registered
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "422":
          description: Validation error
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      summary: Verify an OTP code and activate the account
      tags:
      - auth
  /contents:
    get:
      description: Distinguishes content types by type, supports pagination. Returns
        all types if type is empty.
      parameters:
      - description: video | music | fairy_tale | column | supplement
        in: query
        name: type
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Number of items per page (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      summary: Content list / Get content list
      tags:
      - contents
  /contents/{contentId}:
    get:
      description: 'Returns complete content information: basic information, playback
        settings, subtitles, and single words.'
      parameters:
      - description: Content ID (e.g. video_starbucks_001)
        in: path
        name: contentId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      summary: Content details / Get content detail
      tags:
      - contents
  /contents/search:
    get:
      description: Keyword search across title/subtitle/description/category, with
        optional narrowing type.
      parameters:
      - description: Search keywords
        in: query
        name: q
        required: true
        type: string
      - description: Narrowing type (optional)
        in: query
        name: type
        type: string
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Number of items per page (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
        "400":
          description: q is required
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      summary: Search contents
      tags:
      - contents
  /live-courses:
    get:
      description: Returns scheduled and/or live courses. Pass status as comma-separated
        values, e.g. status=scheduled,live. Reminder flag reflects the current user's
        reminder state.
      parameters:
      - description: 'scheduled | live | ended | cancelled  (comma-separated, default:
          scheduled,live)'
        in: query
        name: status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  properties:
                    data:
                      items:
                        $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_responses.LiveCourseResponse'
                      type: array
                  type: object
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
      security:
      - BearerAuth: []
      summary: List live courses
      tags:
      - lives
  /lives/{liveId}/join:
    post:
      consumes:
      - application/json
      description: Allocates a student Agora UID (10000+), generates an RTC token,
        records the participant, and returns the full join config including teacher
        stream UIDs and WebSocket chat URL.
      parameters:
      - description: Live ID
        in: path
        name: liveId
        required: true
        type: string
      - description: Optional client metadata
        in: body
        name: request
        schema:
          $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_datatransfers_requests.JoinLiveRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/github_com_snykk_go-rest-boilerplate_internal_http_handlers_v1.BaseResponse'
            - properties:
                data:
                  properties:
                    agora:
                      type: object
                    chat:
                      type: object
                    courseId:
                      type: string
