name: Go CI

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - '.gitignore'

  pull_request:
    branches: [ main, develop ]

concurrency:
  group: go-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Format / Static Analysis / Unit Testing / Coverage / Build
  ci:
    name: Format, Vet, Lint, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Show Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Verify dependencies
        run: go mod verify

      # gofmt -l lists unformatted files; exit if output is available.
      - name: Check Go format
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "以下檔案未格式化，請在本機執行 gofmt -w . 後再 push："
            echo "$unformatted"
            exit 1
          fi
          echo "所有檔案格式正確"

      # go vet is an officially built-in static analysis tool.
      - name: Go vet
        run: go vet ./...

      # Pin golangci-lint to prevent unexpected CI failures from upgrades.
      - name: Static analysis (golangci-lint)
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      # Unit tests + coverage.
      # `-covermode=atomic` is required when combined with `-race`.
      - name: Run unit tests with coverage
        run: |
          go test \
            -v \
            -race \
            -count=1 \
            -covermode=atomic \
            -coverprofile=coverage.out \
            ./...

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false

      # Build API server binary.
      - name: Build API binary
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" \
            -o bin/api ./cmd/api

      # Build migration binary.
      - name: Build migration binary
        run: |
          CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" \
            -o bin/migrate ./cmd/migration

  # Integration Testing (Requires Docker, spins up real Postgres + Redis)
  integration-test:
    name: Integration Tests (Testcontainers)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run integration tests
        run: |
          go test \
            -v \
            -race \
            -count=1 \
            -tags=integration \
            -timeout=120s \
            ./...